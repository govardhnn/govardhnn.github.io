    <style>
        body {
            width: 100% !important;
            max-width: 1560px;
        }

        /* ── Full-width split layout ── */
        .library-layout {
            display: flex;
            align-items: flex-start;
            margin: 1em;
            gap: 0;
        }

        /* Left: scrollable shelves */
        .shelves-panel {
            flex: 3;
            min-width: 0;
            padding: 22px 28px 32px 28px;
            background-color: #eee;
            border: 1px solid #333;
        }

        .library-title {
            margin-bottom: 20px;
        }

        .library-title h1 {
            font-size: 22pt;
            font-weight: normal;
            margin: 0 0 4px 0;
        }

        .library-title .subtitle {
            font-style: italic;
            color: #666;
            font-size: 10pt;
        }

        /* Right: sticky review panel */
        .review-panel {
            flex: 2;
            min-width: 260px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            background-color: #e2e2e2;
            border: 1px solid #333;
            border-left: none;
            padding: 24px 18px;
            box-sizing: border-box;
        }

        /* ── Shelf sections ── */
        .shelf-section {
            margin-bottom: 30px;
        }

        /* Wooden shelf */
        .shelf {
            background: linear-gradient(180deg, #d8b06e 0%, #c8984e 55%, #b8883a 100%);
            border-bottom: 16px solid #7a5028;
            border-left: 8px solid #8b6030;
            border-right: 8px solid #8b6030;
            border-top: 3px solid #e2bf7e;
            border-radius: 1px 1px 3px 3px;
            padding: 14px 16px 0 16px;
            min-height: 118px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.32), inset 0 1px 4px rgba(255,255,255,0.22);
        }

        .books-row {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            flex-wrap: wrap;
        }

        /* ── Book on shelf ── */
        .book {
            cursor: pointer;
            flex-shrink: 0;
            transition: margin-bottom 0.16s ease;
            border-radius: 2px 2px 0 0;
        }

        .book img {
            display: block;
            width: 46px;
            height: 78px;
            object-fit: cover;
            border-radius: 2px 2px 0 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.35), inset -2px 0 0 rgba(0,0,0,0.18);
            transition: box-shadow 0.16s ease;
        }

        .book.tall img  { height: 94px; }
        .book.short img { height: 62px; }

        .book:hover {
            margin-bottom: 14px;
        }

        .book.active {
            margin-bottom: 20px;
        }

        .book.active img {
            box-shadow: 2px 0 10px rgba(0,0,0,0.5), 0 0 0 2px #027, inset -2px 0 0 rgba(0,0,0,0.18);
        }

        /* ── Currently reading strip ── */
        .currently-reading {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .cr-book {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 10px;
            border: 1px solid #ccc;
            background: #f4f4f4;
            border-radius: 2px;
            transition: background 0.14s;
            max-width: 200px;
        }

        .cr-book:hover     { background: #e8e8e8; }
        .cr-book.active    { border-color: #027; background: #dde8f2; }

        .cr-book img {
            width: 38px;
            height: 56px;
            object-fit: cover;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.25);
        }

        .cr-info          { font-size: 8.5pt; }
        .cr-title         { font-weight: bold; color: #027; line-height: 1.3; }
        .cr-author        { color: #666; margin-top: 2px; }

        /* ── Review panel ── */
        .review-empty {
            height: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #999;
            font-style: italic;
            font-size: 11pt;
            padding: 40px 16px;
            line-height: 1.6;
        }

        .review-content { display: none; }

        .review-panel-label {
            font-size: 8.5pt;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #999;
            border-bottom: 1px solid #ccc;
            padding-bottom: 6px;
            margin-bottom: 16px;
        }

        .review-cover {
            display: block;
            width: 110px;
            height: auto;
            margin: 0 auto 16px auto;
            box-shadow: 4px 4px 12px rgba(0,0,0,0.35);
            border-radius: 2px;
        }

        .review-title {
            font-size: 12pt;
            font-weight: bold;
            color: #111;
            margin-bottom: 4px;
            text-align: center;
            line-height: 1.3;
        }

        .review-author {
            font-size: 9.5pt;
            color: #666;
            font-style: italic;
            text-align: center;
            margin-bottom: 10px;
        }

        .review-stars {
            text-align: center;
            font-size: 15pt;
            color: #b8860b;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }

        .review-divider {
            border: none;
            border-top: 1px solid #c5c5c5;
            margin: 12px 0;
        }

        .review-text {
            font-size: 9.5pt;
            line-height: 1.65;
            color: #333;
            text-align: justify;
        }

        .review-text.no-review {
            color: #bbb;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>

es down to how you manage your own fears and anxieties,\"</b> while explaining diverse kinds of management styles rather than a one-size-fits-all approach.<br><br>The other half of Part II discusses data vs opinion-based judgement, the types of people you work with, and when to leave a mission.<br><br>In Part III, he takes on a very elaborate study on how to Build Your Product. On how to understand the customer, to make the intangible tangible, how to tell a story like Steve Jobs in 2007 at Macworld, introducing the iPhone 1. <br>He also explains the need for evolution vs distruption vs execution, and the lifecycle of a project during the first, second, and third generations. And the need for crafting a rhythm of heartbeats - updates for internal teams, project members, customers, and why it is extremely important for success.<br><br>Govardhan" },

    // Upscale cover URL for the review panel
    function largeCover(url) {
        return url.replace(/\._S[XY]\d+_\.jpg$/, '._SX315_.jpg');
    }

    function renderStars(n) {
        if (!n) return '';
        return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    let activeEl = null;

    function selectBook(book, el) {
        if (activeEl) activeEl.classList.remove('active');
        activeEl = el;
        el.classList.add('active');

        document.getElementById('reviewEmpty').style.display = 'none';
        document.getElementById('reviewContent').style.display = 'block';

        const cover = document.getElementById('rCover');
        cover.src = largeCover(book.cover);
        cover.alt = book.title;

        document.getElementById('rTitle').textContent  = book.title;
        document.getElementById('rAuthor').textContent = book.author;
        document.getElementById('rStars').textContent  = renderStars(book.rating);

        const textEl = document.getElementById('rText');
        if (book.review) {
            textEl.innerHTML = book.review;
            textEl.className = 'review-text';
        } else {
            textEl.textContent = 'No review yet.';
            textEl.className = 'review-text no-review';
        }
    }

    // Build currently-reading strip
    const crRow = document.getElementById('crRow');
    CURRENTLY_READING.forEach(book => {
        const el = document.createElement('div');
        el.className = 'cr-book';
        el.innerHTML = `
            <img src="${book.cover}" alt="${book.title}">
            <div class="cr-info">
                <div class="cr-title">${book.title}</div>
                <div class="cr-author">${book.author}</div>
            </div>
        `;
        el.addEventListener('click', () => selectBook(book, el));
        crRow.appendChild(el);
    });

    // Build shelves
    const container = document.getElementById('shelvesContainer');
    SHELVES.forEach(shelf => {
        const section = document.createElement('div');
        section.className = 'shelf-section';
        section.innerHTML = `
            <h2 class="section-heading">${shelf.label}</h2>
            <div class="shelf"><div class="books-row" id="row-${shelf.label}"></div></div>
        `;
        container.appendChild(section);

        const row = section.querySelector('.books-row');
        shelf.books.forEach(book => {
            const el = document.createElement('div');
            el.className = 'book' + (book.height ? ' ' + book.height : '');
            el.title = book.title;
            el.innerHTML = `<img src="${book.cover}" alt="${book.title}" loading="lazy">`;
            el.addEventListener('click', () => selectBook(book, el));
            row.appendChild(el);
        });
    });
    </script>
